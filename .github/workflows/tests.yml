name: Tests

on:
  push:
    branches:
      - main
      - develop
      - dev

  pull_request:
    branches:
      - main
      - develop
      - dev

  pull_request_review:

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.11"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v
