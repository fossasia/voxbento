<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Voxbento Interpreter Booth{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/favicon.ico') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/interpreter.css') }}?v=5" />
    {% block head %}{% endblock %}
  </head>
  <body>

    <main class="portal-main">{% block content %}{% endblock %}</main>
    
    <footer class="portal-footer">
        <div class="footer-inner">
            <div>&copy; 2026 VoxBento.</div>
            <div class="footer-links">
                <a href="/research">Research & Benchmarks</a>
                <a href="/llms.txt">LLM Index</a>
            </div>
        </div>
    </footer>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>
    
    <script>
      window.showToast = function(message, type = 'error') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-info');
        toast.textContent = message;
        
        container.appendChild(toast);
        
        setTimeout(() => {
          toast.classList.add('toast-fade');
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      };
      
      // Override alert to use toasts globally
      window.alert = function(msg) {
        window.showToast(msg, 'error');
      };
    </script>
  </body>
</html>
