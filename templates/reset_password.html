{% extends "base.html" %}

{% block title %}Reset Password — Voxbento{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}" />
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="{{ url_for('static', path='img/wordmark.png') }}" alt="Voxbento" class="brand-text" style="height: 48px; margin: 0 auto;" />
      <span class="login-subtitle">Choose a new password</span>
    </div>
    
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/reset/{{ token }}" class="login-form">
      <label for="password">New Password</label>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required minlength="8" autofocus />
      
      <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Reset Password</button>
    </form>
    
    <div class="login-footer">
      <a href="/login">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
