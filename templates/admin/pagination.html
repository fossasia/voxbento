{% if total_pages > 1 %}
<div class="pagination" style="margin-top: 20px; display: flex; justify-content: center; gap: 10px; align-items: center;">
  {% if page > 1 %}
    <a href="?page={{ page - 1 }}" class="btn btn-sm">Previous</a>
  {% else %}
    <span class="btn btn-sm" style="opacity: 0.5; pointer-events: none;">Previous</span>
  {% endif %}

  <span>Page {{ page }} of {{ total_pages }}</span>

  {% if page < total_pages %}
    <a href="?page={{ page + 1 }}" class="btn btn-sm">Next</a>
  {% else %}
    <span class="btn btn-sm" style="opacity: 0.5; pointer-events: none;">Next</span>
  {% endif %}
</div>
{% endif %}
