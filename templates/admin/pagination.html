{% if total_pages > 1 %}
<div class="pagination">
  {% if page > 1 %}
    <a href="?page={{ page - 1 }}" class="btn btn-sm">Previous</a>
  {% else %}
    <span class="btn btn-sm btn-disabled">Previous</span>
  {% endif %}

  <span>Page {{ page }} of {{ total_pages }}</span>

  {% if page < total_pages %}
    <a href="?page={{ page + 1 }}" class="btn btn-sm">Next</a>
  {% else %}
    <span class="btn btn-sm btn-disabled">Next</span>
  {% endif %}
</div>
{% endif %}
