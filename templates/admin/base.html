<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Admin Panel{% endblock %} — Voxbento</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/favicon.ico') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='css/admin.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="admin-header">
      <div class="header-left">
        <a class="brand" href="/admin/"><img src="{{ url_for('static', path='img/wordmark.png') }}" alt="Voxbento" style="height: 32px; vertical-align: middle;" /></a>
        <span class="header-badge">Admin</span>
      </div>
      <nav class="header-nav">
        <a href="/admin/">Dashboard</a>
        <a href="/admin/events/">Events</a>
        <a href="/admin/users/">Users</a>
        <a href="/" target="_blank">Portal Home</a>
        <a href="/admin/logout" class="nav-logout">Logout</a>
      </nav>
    </header>

    {% block breadcrumb %}{% endblock %}

    <main class="admin-main">
      {% block content %}{% endblock %}
    </main>

    <!-- Custom Confirm Modal -->
    <div id="custom-confirm-modal" class="custom-modal-overlay" style="display: none;">
      <div class="custom-modal">
        <div class="custom-modal-header" style="margin-bottom: 1rem;">
          <img src="{{ url_for('static', path='img/wordmark.png') }}" alt="Voxbento" style="height: 24px; vertical-align: middle;" />
        </div>
        <div class="custom-modal-body">
          <p id="custom-confirm-message" style="margin-bottom: 1rem; font-weight: 500;"></p>
          <p id="custom-confirm-funny" class="muted" style="font-size: 0.85rem; font-style: italic; margin-bottom: 1.5rem;"></p>
        </div>
        <div class="custom-modal-footer" style="display: flex; gap: 1rem; justify-content: flex-end;">
          <button id="custom-confirm-cancel" class="btn btn-outline" type="button">Cancel</button>
          <button id="custom-confirm-ok" class="btn btn-danger" type="button">Confirm</button>
        </div>
      </div>
    </div>

    <script type="module" src="{{ url_for('static', path='js/admin.js') }}"></script>
  </body>
</html>
