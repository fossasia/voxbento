{% extends 'admin/base.html' %}

{% block title %}Mission Control - {{ event.display_name }} | Voxbento{% endblock %}

{% block content %}
<div class="container mc-container">
  <div class="mc-header">
    <div>
      <h2>Mission Control: {{ event.display_name }}</h2>
      <p class="mc-header-sub">Monitor and control booths in real-time.</p>
    </div>
    <a href="javascript:history.back()" class="btn btn-sm">Back to Events</a>
  </div>

  <div id="booth-grid" class="mc-grid">
    <!-- Booth cards injected here by JS -->
  </div>
</div>

<script>
  window.MISSION_CONTROL_CONFIG = {
    eventSlug: "{{ event.slug }}",
    whipBase: "{{ whip_base }}",
    initialBooths: {{ booths | tojson | safe }}
  };
</script>
<script src="{{ url_for('static', path='js/whep-listener.js') }}?v={{ js_version }}"></script>
<script type="module" src="{{ url_for('static', path='js/mission-control.js') }}?v={{ js_version }}"></script>
{% endblock %}
