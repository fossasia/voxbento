{% extends "base.html" %}
{% block title %}Join {{ event.display_name }} | VoxBento{% endblock %}
{% block head %}<script src="https://cdn.tailwindcss.com"></script>{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-900 flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">{{ event.display_name }}</h1>
            <p class="text-gray-400">Enter the join code to access the listener page.</p>
        </div>

        {% if error %}
        <div class="mb-6 bg-red-500/10 border border-red-500/50 rounded-lg p-4 text-red-400 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/listener/{{ event.slug }}" method="GET" class="space-y-6">
            <div>
                <label for="code" class="block text-sm font-medium text-gray-300 mb-2">Join Code</label>
                <input type="text" id="code" name="code" required
                    class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"
                    placeholder="Enter code here">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200">
                Join Event
            </button>
        </form>
    </div>
</div>
{% endblock %}
