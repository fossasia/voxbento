{% extends "base.html" %}
{% block title %}Listen — {{ booth_id }} | Voxbento{% endblock %}
{% block head %}
<style>
  .listener-container {
    max-width: 600px;
    margin: 2rem auto;
    text-align: center;
    font-family: system-ui, sans-serif;
  }
  .listener-container h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .listener-container p { color: #666; margin-bottom: 1.5rem; }
  #audio-player { width: 100%; margin: 1rem 0; }
  .status-badge {
    display: inline-block;
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .status-badge.live { background: #d4edda; color: #155724; }
  .status-badge.waiting { background: #fff3cd; color: #856404; }
  .status-badge.error { background: #f8d7da; color: #721c24; }
  .status-badge.recovering { background: #cce5ff; color: #004085; }
  #stream-log {
    margin-top: 1rem;
    text-align: left;
    font-family: monospace;
    font-size: 0.75rem;
    max-height: 150px;
    overflow-y: auto;
    background: #f8f9fa;
    padding: 0.5rem;
    border-radius: 4px;
    color: #333;
  }
</style>
{% endblock %}
{% block content %}
<div class="listener-container">
  <h1>🎧 Listening: {{ booth_id }}</h1>
  <p>Language: {{ language }} &middot; Channel: {{ channel_id }}</p>

  <div id="status"><span class="status-badge waiting">Connecting...</span></div>
  <audio id="audio-player" controls autoplay></audio>
  <div id="stream-log"></div>
  <div style="margin-top:0.5rem; font-size:0.82rem; color:#666;">
    <a href="/listener-webrtc/{{ booth_id }}?language={{ language }}&channel={{ channel_id }}" style="color:#0066cc;">Switch to WebRTC listener (low-latency)</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
(function() {
  const hlsUrl = '{{ hls_url }}'
  const audio = document.getElementById('audio-player')
  const statusEl = document.getElementById('status')
  const logEl = document.getElementById('stream-log')
  let hls = null
  let retryTimer = null
  let retryDelay = 2000   // start at 2s, back off to 8s max
  let lastFragTime = 0

  function setStatus(text, cls) {
    statusEl.innerHTML = `<span class="status-badge ${cls}">${text}</span>`
  }

  function log(msg) {
    const line = document.createElement('div')
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
    logEl.appendChild(line)
    logEl.scrollTop = logEl.scrollHeight
  }

  /** Destroy current hls instance, wait, then build a fresh one. */
  function scheduleReconnect(delay) {
    if (retryTimer) return  // already scheduled
    setStatus('Reconnecting...', 'recovering')
    retryTimer = setTimeout(() => {
      retryTimer = null
      createHls()
    }, delay)
  }

  function createHls() {
    if (hls) { hls.destroy(); hls = null }

    hls = new Hls({
      manifestLoadingRetryDelay: 500,
      manifestLoadingMaxRetry: 6,         // 6 × 500ms = 3s of retries
      manifestLoadingMaxRetryTimeout: 3000,
      levelLoadingRetryDelay: 500,
      levelLoadingMaxRetry: 6,
      fragLoadingRetryDelay: 500,
      fragLoadingMaxRetry: 6,
      liveSyncDurationCount: 2,
      liveMaxLatencyDurationCount: 4,
      enableWorker: true,
    })

    hls.loadSource(hlsUrl)
    hls.attachMedia(audio)

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      retryDelay = 2000  // reset backoff on success
      setStatus('Live', 'live')
      log('Stream connected — playing audio')
      audio.play().catch(() => {})
    })

    hls.on(Hls.Events.ERROR, (_event, data) => {
      if (data.fatal) {
        // On ANY fatal error, destroy and recreate with backoff.
        // hls.startLoad() / recoverMediaError() don't handle the
        // playlist-sequence-reset that happens during interpreter handoff.
        log(`Stream lost (${data.details}) — will reconnect in ${retryDelay / 1000}s`)
        scheduleReconnect(retryDelay)
        retryDelay = Math.min(retryDelay * 1.5, 8000)
      }
    })

    hls.on(Hls.Events.FRAG_LOADED, () => {
      lastFragTime = Date.now()
      retryDelay = 2000
      setStatus('Live', 'live')
    })
  }

  if (Hls.isSupported()) {
    createHls()

    // If no fragments arrive for 10s, show "waiting"
    setInterval(() => {
      if (lastFragTime && Date.now() - lastFragTime > 10000) {
        setStatus('Waiting for interpreter...', 'waiting')
      }
    }, 3000)

  } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS — limited error recovery
    audio.src = hlsUrl
    audio.addEventListener('playing', () => setStatus('Live', 'live'))
    audio.addEventListener('waiting', () => setStatus('Buffering...', 'recovering'))
    audio.addEventListener('error', () => {
      setStatus('Reconnecting...', 'recovering')
      log('Stream interrupted — retrying in 3s')
      setTimeout(() => { audio.src = hlsUrl; audio.play().catch(() => {}) }, 3000)
    })
    audio.play().catch(() => {})
  } else {
    setStatus('HLS not supported in this browser', 'error')
  }
})()
</script>
{% endblock %}
