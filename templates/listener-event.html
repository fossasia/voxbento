{% extends "base.html" %}
{% block title %}Listen (WebRTC) — {{ event.display_name }} | Voxbento{% endblock %}
{% block head %}
<style>
  .listener-container {
    max-width: 640px;
    margin: 2rem auto;
    text-align: center;
    font-family: system-ui, sans-serif;
  }
  .listener-container h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  .listener-container p { color: #666; margin-bottom: 1.5rem; }
  #audio-player { width: 100%; margin: 1rem 0; }

  .status-badge {
    display: inline-block;
    padding: 0.3rem 0.8rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .status-badge.live        { background: #d4edda; color: #155724; }
  .status-badge.waiting     { background: #fff3cd; color: #856404; }
  .status-badge.error       { background: #f8d7da; color: #721c24; }
  .status-badge.recovering  { background: #cce5ff; color: #004085; }

  /* Captions Box */
  .captions-container {
    margin-top: 2rem;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
  }
  .captions-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    padding: 0 0.5rem;
  }
  .captions-header h3 {
    margin: 0;
    font-size: 1.1rem;
    color: #444;
  }
  .toggle-btn {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: #666;
  }
  .toggle-btn:hover {
    color: #000;
  }
  .captions-box {
    margin: 0 auto;
    width: 100%;
    height: 40vh;
    min-height: 200px;
    max-height: 500px;
    background: #222;
    color: #fff;
    border-radius: 8px;
    padding: 1rem;
    overflow-y: auto;
    text-align: left;
    transition: all 0.3s ease;
  }
  .captions-container.minimized .captions-box {
    height: 0;
    min-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    overflow: hidden;
    opacity: 0;
  }
    font-size: 1.1rem;
    line-height: 1.5;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .captions-box p {
    margin: 0;
    color: #eee;
    animation: fadeIn 0.3s ease-in-out;
  }
  .caption-history {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    color: #ccc;
  }
  .caption-current {
    color: #fff;
    font-weight: 500;
    min-height: 1.5em;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }


  .selectors-container {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .selector-group {
    display: flex;
    flex-direction: column;
    text-align: left;
  }
  .selector-group label {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
  }
  .selector-group select {
    min-width: 150px;
  }
</style>
{% endblock %}
{% block content %}
<div class="listener-container">
  <h1>Listen: {{ event.display_name }}</h1>
  
  <div class="selectors-container">
    <div class="selector-group">
      <label for="room-select">Room</label>
      <select id="room-select" class="input">
        <option value="">-- Select Room --</option>
        {% for room in rooms %}
        <option value="{{ room.id }}">{{ room.display_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="selector-group">
      <label for="language-select">Language</label>
      <select id="language-select" class="input" disabled>
        <option value="">-- Select Language --</option>
      </select>
    </div>
  </div>

  <div id="status"><span class="status-badge waiting">Waiting for selection...</span></div>
  <audio id="audio-player" autoplay style="width:100%; margin:1rem 0; display:none;"></audio>

  <div class="captions-container" id="captions-container">
    <div class="captions-header" style="justify-content: space-between; align-items: flex-end;">
      <div class="selectors-container" style="margin-bottom: 0; gap: 1rem;">
        <div class="selector-group">
          <label for="caption-mode-select">Captions Mode</label>
          <select id="caption-mode-select" class="input" disabled>
            <option value="original">Original</option>
            <option value="translated">Translated</option>
            <option value="side-by-side">Side-by-Side</option>
          </select>
        </div>
        <div class="selector-group" id="translation-lang-group" style="display: none;">
          <label for="translation-lang-select">Target Language</label>
          <select id="translation-lang-select" class="input">
            <!-- Populated dynamically via JS based on room settings -->
          </select>
        </div>
      </div>
      <button id="toggle-captions-btn" class="toggle-btn" title="Minimize/Maximize Captions" style="margin-bottom: 0.5rem;">▼</button>
    </div>
    <div id="live-captions" class="captions-box">
      <div id="captions-content-area" class="captions-content" style="display: flex; gap: 20px;">
        <div id="captions-col-original" style="flex: 1; display: flex; flex-direction: column;">
          <div class="caption-history" id="caption-history"></div>
          <div class="caption-current" id="caption-current"></div>
        </div>
        <div id="captions-col-translated" style="flex: 1; display: none; flex-direction: column; border-left: 1px solid #444; padding-left: 20px;">
          <div class="caption-history" id="translation-history"></div>
          <div class="caption-current" id="translation-current"></div>
        </div>
      </div>
      <p id="waiting-text" style="color: #888; font-style: italic; font-size: 0.95rem;">Waiting for interpreter...</p>
    </div>
  </div>

</div>

<script>
  document.getElementById('toggle-captions-btn').addEventListener('click', function() {
    var container = document.getElementById('captions-container');
    container.classList.toggle('minimized');
    if (container.classList.contains('minimized')) {
      this.textContent = '▲';
    } else {
      this.textContent = '▼';
    }
  });
</script>

<script src="{{ url_for('static', path='js/whep-listener.js') }}?v={{ js_version }}"></script>
<script>
(function () {
  var boothsData = {{ booths_json | safe }};
  
  var roomsData = {{ rooms_json | safe }};
  
  var roomSelect = document.getElementById('room-select');
  var languageSelect = document.getElementById('language-select');
  var captionModeSelect = document.getElementById('caption-mode-select');
  var translationLangSelect = document.getElementById('translation-lang-select');
  
  var audioEl = document.getElementById('audio-player');
  var statusEl = document.getElementById('status');
  var captionsBox = document.getElementById('live-captions');
  var captionsWs = null;

  function setStatus(text, cls) {
    statusEl.innerHTML = '<span class="status-badge ' + cls + '">' + text + '</span>';
  }

  function showAudioPlayer(show) {
    audioEl.style.display = show ? 'block' : 'none';
    if (show) {
      audioEl.setAttribute('controls', '');
    } else {
      audioEl.removeAttribute('controls');
    }
  }

  function onState(s) {
    if (s.peerConnection === 'connected' && s.audioActive) {
      setStatus('Live (WebRTC)', 'live');
      showAudioPlayer(true);
    } else if (s.peerConnection === 'connecting' || s.ice === 'checking') {
      setStatus('Connecting...', 'recovering');
    } else if (s.peerConnection === 'failed' || s.peerConnection === 'disconnected') {
      setStatus('Reconnecting...', 'recovering');
    } else if (s.peerConnection === 'connected') {
      setStatus('Connected — waiting for audio', 'waiting');
    } else if (s.peerConnection === 'closed') {
      setStatus('Disconnected', 'error');
    }
  }

  var pendingBoothId = null;   // booth currently being watched (pre-live)
  var pendingWhepUrl = null;   // WHEP URL to start once live

  function stopCurrentStream() {
    WhepListener.stop();
    pendingBoothId = null;
    pendingWhepUrl = null;
    if (captionsWs) {
      captionsWs.close();
      captionsWs = null;
    }
    showAudioPlayer(false);
    document.getElementById('caption-history').innerHTML = '';
    document.getElementById('caption-current').innerHTML = '';
    document.getElementById('translation-history').innerHTML = '';
    document.getElementById('translation-current').innerHTML = '';
    
    setStatus('Waiting for selection...', 'waiting');
  }

  function startWhepAndCaptions(whepUrl, boothId) {
    setStatus('Connecting...', 'recovering');
    WhepListener.start({
      whepUrl: whepUrl,
      audioEl: audioEl,
      onState: onState
    });
    openCaptionsWs(boothId);
  }

  function openCaptionsWs(boothId) {
    if (!boothId) return;
    var wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    captionsWs = new WebSocket(wsProto + '//' + window.location.host + '/ws/captions/' + boothId);
    captionsWs.onmessage = handleCaptionsMessage;
  }

  function handleCaptionsMessage(event) {
    try {
      var data = JSON.parse(event.data);
      var waitingText = document.getElementById('waiting-text');

      if (data.type === 'booth:state') {
        var bstate = data.state || {};
        // If we were waiting for the broadcast to go live, start WHEP now.
        if (pendingWhepUrl && bstate.ingest_status === 'connected') {
          var url = pendingWhepUrl;
          var bid = pendingBoothId;
          pendingWhepUrl = null;
          pendingBoothId = null;
          WhepListener.start({ whepUrl: url, audioEl: audioEl, onState: onState });
        }
        // If broadcast was locked, tear down.
        if (bstate.broadcast_unlocked === false) {
          WhepListener.stop();
          showAudioPlayer(false);
          setStatus('Broadcast is currently locked by the organizers.', 'error');
          roomSelect.value = '';
          languageSelect.innerHTML = '<option value="">-- Select Language --</option>';
          languageSelect.disabled = true;
          captionModeSelect.disabled = true;
          captionModeSelect.value = 'original';
          translationLangSelect.innerHTML = '';
          updateCaptionLayout();
        }
        return;
      }

      if (data.type === 'caption') {
        if (waitingText) waitingText.remove();
        var historyBox = document.getElementById('caption-history');
        var currentBox = document.getElementById('caption-current');
        if (data.status === 'partial') {
          currentBox.textContent = data.text || '';
        } else if (data.status === 'final') {
          if (data.text) {
            var p = document.createElement('div');
            p.textContent = data.text;
            historyBox.appendChild(p);
            while (historyBox.children.length > 50) historyBox.removeChild(historyBox.firstChild);
          }
          currentBox.textContent = '';
        } else if (data.status === 'clear') {
          currentBox.textContent = '';
        }
        captionsBox.scrollTop = captionsBox.scrollHeight;
      } else if (data.type === 'translation') {
        if (data.language_code === translationLangSelect.value) {
          var tHistoryBox = document.getElementById('translation-history');
          var tp = document.createElement('div');
          tp.textContent = data.text;
          tHistoryBox.appendChild(tp);
          while (tHistoryBox.children.length > 50) tHistoryBox.removeChild(tHistoryBox.firstChild);
          captionsBox.scrollTop = captionsBox.scrollHeight;
        }
      }
    } catch (e) {
      console.error('Failed to parse caption data', e);
    }
  }

  function updateCaptionLayout() {
    var mode = captionModeSelect.value;
    var colOrig = document.getElementById('captions-col-original');
    var colTrans = document.getElementById('captions-col-translated');
    var transGroup = document.getElementById('translation-lang-group');
    
    if (mode === 'original') {
      colOrig.style.display = 'flex';
      colTrans.style.display = 'none';
      transGroup.style.display = 'none';
    } else if (mode === 'translated') {
      colOrig.style.display = 'none';
      colTrans.style.display = 'flex';
      colTrans.style.borderLeft = 'none';
      colTrans.style.paddingLeft = '0';
      transGroup.style.display = 'flex';
    } else if (mode === 'side-by-side') {
      colOrig.style.display = 'flex';
      colTrans.style.display = 'flex';
      colTrans.style.borderLeft = '1px solid #444';
      colTrans.style.paddingLeft = '20px';
      transGroup.style.display = 'flex';
    }
  }

  captionModeSelect.addEventListener('change', updateCaptionLayout);

  roomSelect.addEventListener('change', function() {
    var roomId = parseInt(this.value, 10);
    languageSelect.innerHTML = '<option value="">-- Select Language --</option>';
    
    stopCurrentStream();

    if (!roomId) {
      languageSelect.disabled = true;
      captionModeSelect.disabled = true;
      captionModeSelect.value = 'original';
      updateCaptionLayout();
      return;
    }
    
    languageSelect.disabled = false;
    var roomBooths = boothsData.filter(function(b) { return b.room_id === roomId; });
    
    roomBooths.forEach(function(b) {
      var opt = document.createElement('option');
      opt.value = b.whep_url;
      opt.textContent = b.language_name;
      // b.language_code here is "floor" for floor audio
      if (b.language_code === 'floor') {
        opt.dataset.boothId = '{{ event.slug }}-floor';
      } else {
        opt.dataset.boothId = '{{ event.slug }}-' + b.language_code;
      }
      opt.dataset.boothObjId = b.id;
      languageSelect.appendChild(opt);
    });
    
    // Reset translation dropdown until language is selected
    captionModeSelect.disabled = true;
    captionModeSelect.value = 'original';
    translationLangSelect.innerHTML = '';
    updateCaptionLayout();
  });

  languageSelect.addEventListener('change', function() {
    stopCurrentStream();
    var whepUrl = this.value;
    var selectedOpt = this.options[this.selectedIndex];
    var boothId = selectedOpt ? selectedOpt.dataset.boothId : null;
    var boothObjId = selectedOpt ? selectedOpt.dataset.boothObjId : null;
    
    // Setup translation options based on the selected audio source
    if (boothObjId) {
      var bData = boothsData.find(b => b.id.toString() === boothObjId.toString());
      if (bData && bData.translation_enabled && bData.translation_languages && bData.translation_languages.length > 0) {
        captionModeSelect.disabled = false;
        translationLangSelect.innerHTML = '';
        bData.translation_languages.forEach(lang => {
          var opt = document.createElement('option');
          opt.value = lang.code;
          opt.textContent = lang.name;
          translationLangSelect.appendChild(opt);
        });
      } else {
        captionModeSelect.disabled = true;
        captionModeSelect.value = 'original';
        translationLangSelect.innerHTML = '';
      }
    } else {
      captionModeSelect.disabled = true;
      captionModeSelect.value = 'original';
      translationLangSelect.innerHTML = '';
    }
    updateCaptionLayout();
    
    if (whepUrl) {
      // Check booth live status before starting WHEP to avoid phantom timer.
      if (boothId) {
        openCaptionsWs(boothId);
        fetch('/api/booth/' + boothId + '/state')
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(bstate) {
            if (bstate && bstate.ingest_status === 'connected') {
              startWhepAndCaptions(whepUrl, null); // WS already open
            } else {
              // Not live yet — wait for booth:state via WS
              pendingWhepUrl = whepUrl;
              pendingBoothId = boothId;
              setStatus('Broadcast not live yet — waiting...', 'waiting');
              showAudioPlayer(false);
            }
          })
          .catch(function() {
            // Can't determine state — start anyway
            startWhepAndCaptions(whepUrl, null);
          });
      } else {
        startWhepAndCaptions(whepUrl, null);
      }
    }
  });

  // Clean up on page unload.
  window.addEventListener('beforeunload', function () {
    WhepListener.stop();
  });
})();
</script>
{% endblock %}
