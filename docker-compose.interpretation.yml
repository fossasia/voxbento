services:

  # ── MediaMTX audio server ─────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:1
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8888:8888"    # MediaMTX HTTP
      - "8889:8889"    # WHIP/WHEP (WebRTC HTTP ingest + playback)
      - "8189:8189/udp" # WebRTC ICE/UDP mux (matches webrtcLocalUDPAddress in mediamtx.yml)
      - "9997:9997"    # Control API (used by FastAPI to create alwaysAvailable paths)
    restart: unless-stopped
    # No HTTP healthcheck: the MediaMTX root path always returns 404 until a stream is
    # published, which would falsely mark the container as unhealthy. The MediaMTX
    # base image also does not include wget/curl. Use `docker logs mediamtx` and
    # port connectivity to verify the container is up during local development.
